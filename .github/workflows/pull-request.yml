name: PR Testing

on:
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  handle-syncwith:
    name: Call Reusable SyncWith Handler
    uses: NilFoundation/ci-cd/.github/workflows/reusable-handle-syncwith.yml@0588663776c5989c2ba23064811e7f71a20ada83
    with:
      ci-cd-ref: '0588663776c5989c2ba23064811e7f71a20ada83'
    secrets: inherit

  matrix-test:
    name: Call Reusable Crypto3 Testing
    needs:
      - handle-syncwith
    uses: NilFoundation/ci-cd/.github/workflows/reusable-crypto3-testing.yml@0588663776c5989c2ba23064811e7f71a20ada83
    with:
      submodules-refs: ${{ needs.handle-syncwith.outputs.prs-refs }}
    secrets: inherit
